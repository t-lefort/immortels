version: '3.8'
services:
  app:
    image: ghcr.io/t-lefort/immortels:latest
    ports:
      - "3000:3000"
    volumes:
      - immortels-data:/app/data
    environment:
      - NODE_ENV=production
      - PORT=3000
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/game/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  immortels-data:
